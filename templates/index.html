<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equity Analyzer — Análise Fundamentalista</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo" onclick="goHome()" title="Voltar ao início">
        <span class="logo-icon">📊</span>
        <span class="logo-text">Equity Analyzer</span>
        <span class="logo-sub">por Jmarcio31</span>
      </div>
      <div class="search-bar" id="header-search" style="display:none">
        <div class="ticker-inputs" id="ticker-inputs-header"></div>
        <button class="btn-analyze" id="btn-analyze-header" onclick="runAnalysis()">
          <span id="btn-text-header">Analisar</span>
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- LANDING -->
    <div id="landing" class="landing">
      <div class="landing-content">
        <h1>Análise Fundamentalista</h1>
        <p>45 trimestres · ROIC · EVA · FCF · Graham · Margem de Segurança</p>

        <div class="ticker-search-area">
          <div class="ticker-slots" id="ticker-slots">
            <div class="ticker-slot" id="slot-0">
              <input class="ticker-main-input" id="main-t0" placeholder="Ex: GOOGL" maxlength="10" autocomplete="off" oninput="filterSuggestions(0)" onkeydown="handleKey(event,0)">
              <div class="suggestions" id="sug-0"></div>
            </div>
            <div class="ticker-slot" id="slot-1">
              <input class="ticker-main-input" id="main-t1" placeholder="Comparar com... (opcional)" maxlength="10" autocomplete="off" oninput="filterSuggestions(1)" onkeydown="handleKey(event,1)">
              <div class="suggestions" id="sug-1"></div>
            </div>
            <div class="ticker-slot" id="slot-2">
              <input class="ticker-main-input" id="main-t2" placeholder="Comparar com... (opcional)" maxlength="10" autocomplete="off" oninput="filterSuggestions(2)" onkeydown="handleKey(event,2)">
              <div class="suggestions" id="sug-2"></div>
            </div>
          </div>
          <button class="btn-analyze-main" onclick="runAnalysis()">
            <span id="btn-text-main">Analisar</span>
          </button>
        </div>

        <div class="landing-chips">
          <span class="chip-label">Sugestões:</span>
          <span class="chip" onclick="setTickers('GOOGL','AAPL','META')">GOOGL · AAPL · META</span>
          <span class="chip" onclick="setTickers('NVDA','MSFT','AMZN')">NVDA · MSFT · AMZN</span>
          <span class="chip" onclick="setTickers('TSLA','BRK-B','JPM')">TSLA · BRK-B · JPM</span>
        </div>
      </div>
    </div>

    <div id="error-box" class="error-box hidden"></div>
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Buscando dados no Yahoo Finance…</p>
    </div>

    <div id="results" class="results hidden"></div>
  </main>

</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
