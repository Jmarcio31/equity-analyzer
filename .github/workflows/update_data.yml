# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions — Atualização semanal de dados fundamentalistas
#
# Roda toda segunda-feira às 14:00 UTC (11:00 BRT).
# O script verifica se há trimestres novos disponíveis na API
# e só consome requisições quando encontra dados novos.
#
# Com 28 tickers e limite de 25 req/dia:
#   - Semanas sem novidade: ~28 req (só verificação) — termina em 1 dia
#   - Semanas com novidade: até 4 tickers por dia, ~7 dias para atualizar tudo
#
# Secrets necessários (Settings > Secrets and variables > Actions):
#   AV_API_KEY   — sua chave Alpha Vantage
#   DATABASE_URL — External URL do PostgreSQL no Render
# ─────────────────────────────────────────────────────────────────────────────

name: Weekly Equity Data Update

on:
  schedule:
    # Toda segunda-feira às 14:00 UTC (11:00 BRT)
    - cron: '0 14 * * 1'

  # Permite executar manualmente pelo GitHub UI (botão "Run workflow")
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instala dependências
        run: pip install requests psycopg2-binary

      - name: Injeta credenciais e executa atualização
        env:
          AV_API_KEY:   ${{ secrets.AV_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - << 'PYEOF'
import os

script_path = 'load_av.py'
with open(script_path, 'r') as f:
    code = f.read()

av_key = os.environ['AV_API_KEY']
db_url = os.environ['DATABASE_URL']

code = code.replace(
    'AV_KEY       = "DZHRZQ6SWSMUBW4J"',
    f'AV_KEY       = "{av_key}"'
)
code = code.replace(
    'DATABASE_URL = "postgresql://equity_analyzer_db_hx38_user:YUfgSMUWH6OuWEacmiXSwTyPx5ow163n@dpg-d7aghkua2pns73dg3rd0-a.ohio-postgres.render.com/equity_analyzer_db_hx38"',
    f'DATABASE_URL = "{db_url}"'
)

with open(script_path, 'w') as f:
    f.write(code)

print(f"Credenciais configuradas. Executando load_av.py --update...")
PYEOF
          python load_av.py --update

      - name: Resumo
        if: always()
        run: echo "Atualização concluída em $(date '+%Y-%m-%d %H:%M UTC')"
