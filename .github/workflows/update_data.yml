name: Equity Data Maintenance

on:
  schedule:
    - cron: '0 14 * * 1'
    - cron: '0 22 * * 2-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo'
        required: true
        default: 'prices'
        type: choice
        options:
          - prices
          - update

jobs:
  update_fundamentals:
    name: Atualizar fundamentais (seg)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: "github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'update' || github.event_name == 'schedule' && github.event.schedule == '0 14 * * 1'"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests psycopg2-binary
      - name: Injeta credenciais
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          sed -i "s|AV_KEY       = \"DZHRZQ6SWSMUBW4J\"|AV_KEY       = \"$AV_API_KEY\"|g" load_av.py
          sed -i "s|DATABASE_URL = \"postgresql://equity_analyzer_db_hx38_user:YUfgSMUWH6OuWEacmiXSwTyPx5ow163n@dpg-d7aghkua2pns73dg3rd0-a.ohio-postgres.render.com/equity_analyzer_db_hx38\"|DATABASE_URL = \"$DATABASE_URL\"|g" load_av.py
          python load_av.py --update

  update_prices:
    name: Atualizar cotações (ter-sex)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: "github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'prices' || github.event_name == 'schedule' && github.event.schedule == '0 22 * * 2-5'"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests psycopg2-binary
      - name: Injeta credenciais
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          sed -i "s|AV_KEY       = \"DZHRZQ6SWSMUBW4J\"|AV_KEY       = \"$AV_API_KEY\"|g" load_av.py
          sed -i "s|DATABASE_URL = \"postgresql://equity_analyzer_db_hx38_user:YUfgSMUWH6OuWEacmiXSwTyPx5ow163n@dpg-d7aghkua2pns73dg3rd0-a.ohio-postgres.render.com/equity_analyzer_db_hx38\"|DATABASE_URL = \"$DATABASE_URL\"|g" load_av.py
          python load_av.py --prices
