name: Equity Data Maintenance

on:
  schedule:
    - cron: '0 14 * * 1'      # Fundamentais: segunda às 14h UTC (11h BRT)
    - cron: '0 22 * * 2-5'    # Cotações: ter-sex às 22h UTC (19h BRT)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo'
        required: true
        default: 'prices'
        type: choice
        options:
          - prices
          - update

jobs:
  update_fundamentals:
    name: Atualizar fundamentais (seg)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: "github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'update' || github.event_name == 'schedule' && github.event.schedule == '0 14 * * 1'"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests psycopg2-binary
      - name: Atualiza fundamentais
        env:
          AV_KEY: ${{ secrets.AV_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python load_av.py --update

  update_prices:
    name: Atualizar cotações (ter-sex)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: "github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'prices' || github.event_name == 'schedule' && github.event.schedule == '0 22 * * 2-5'"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests psycopg2-binary
      - name: Atualiza cotações
        env:
          AV_KEY: ${{ secrets.AV_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python load_av.py --prices
