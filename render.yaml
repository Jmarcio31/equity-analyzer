services:
  - type: web
    name: equity-analyzer
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FMP_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
